<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Design Tracker</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#1e1f22; color:#e6e6e6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.5; }
  a { color:#5aa6ff; text-decoration:none; } a:hover { text-decoration:underline; }
  .wrap { max-width:1200px; margin:0 auto; padding:22px 20px 64px; }
  .header { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  h1 { font-size:25px; margin:0; }
  .sub { color:#9aa0a6; font-size:13px; margin:2px 0 16px; }
  .sub a { color:#9aa0a6; text-decoration:underline; }
  .controls { display:flex; gap:8px; flex:0 0 auto; flex-wrap:wrap; align-items:center; }
  input, select, textarea, button { font-family:inherit; }
  #search, .flt { height:36px; padding:0 11px; font-size:13.5px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; outline:none; }
  #search { width:200px; max-width:100%; }
  #search:focus, .flt:focus { border-color:#5aa6ff; }
  .btn { height:36px; padding:0 13px; font-size:13px; font-weight:600; color:#cdd2d8; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; cursor:pointer; }
  .btn:hover { border-color:#5aa6ff; color:#fff; }
  .btn-primary { background:#2684FF; color:#fff; border-color:#2684FF; }
  .btn-primary:hover { background:#1a6fe0; }
  .quickadd { display:flex; gap:8px; margin:0 0 18px; }
  .quickadd input { flex:1; height:42px; padding:0 14px; font-size:14px; color:#e6e6e6; background:#26282c; border:1px solid #34363b; border-radius:10px; outline:none; }
  .quickadd input:focus { border-color:#5aa6ff; }
  /* list */
  .list { display:flex; flex-direction:column; gap:7px; }
  .lhead, .lrow { display:grid; grid-template-columns:46px minmax(0,1fr) 150px 150px 52px 92px; gap:14px; align-items:center; }
  .lhead { padding:4px 14px 6px; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#7f868f; }
  .lrow { background:#26282c; border:1px solid #34363b; border-radius:11px; padding:11px 14px; cursor:pointer; }
  .lrow:hover { border-color:#4a4d55; }
  .t-title { font-size:14px; font-weight:700; color:#f0f1f3; }
  .t-notes { font-size:12px; color:#8a9098; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-link { font-size:11px; color:#5aa6ff; margin-top:3px; display:inline-block; }
  .pri { display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:22px; padding:0 6px; border-radius:6px; font-size:11px; font-weight:800; }
  .pri.P0 { background:#3a2122; color:#ff8a80; border:1px solid #5e2f30; }
  .pri.P1 { background:#3a3020; color:#ffc46b; border:1px solid #5e4d2a; }
  .pri.P2 { background:#1f2b3d; color:#7db2ff; border:1px solid #2c456b; }
  .pri.P3 { background:#2b2d31; color:#9aa0a6; border:1px solid #3a3c42; }
  .pri.none { color:#5a616a; font-weight:600; }
  .st { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:#cdd2d8; }
  .st-dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .chip { font-size:11px; font-weight:600; color:#cdd2d8; background:#2b2d31; border-radius:100px; padding:2px 9px; justify-self:start; }
  .ver { font-size:11px; font-weight:700; color:#cdd2d8; background:#2b2d31; border:1px solid #3a3c42; border-radius:6px; padding:1px 7px; justify-self:start; }
  .upd { font-size:11.5px; color:#7f868f; }
  .nores { display:none; color:#c98a8a; padding:18px 4px; }
  /* editor drawer */
  .ov { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:none; }
  .ov.open { display:block; }
  .drawer { position:fixed; top:0; right:0; bottom:0; width:min(440px,94vw); background:#1b1c1f; border-left:1px solid #34363b;
    z-index:51; transform:translateX(100%); transition:transform .24s ease; display:flex; flex-direction:column; box-shadow:-2px 0 26px rgba(0,0,0,.45); }
  .drawer.open { transform:translateX(0); }
  .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid #34363b; }
  .drawer-head strong { font-size:15px; }
  .drawer-body { overflow:auto; padding:16px 18px; flex:1; }
  .drawer-foot { display:flex; gap:10px; padding:14px 18px; border-top:1px solid #34363b; }
  .fld { margin-bottom:14px; }
  .fld label { display:block; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#8a9098; margin-bottom:6px; }
  .fld input, .fld select, .fld textarea { width:100%; padding:9px 11px; font-size:14px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; outline:none; }
  .fld input:focus, .fld select:focus, .fld textarea:focus { border-color:#5aa6ff; }
  .fld textarea { min-height:150px; resize:vertical; line-height:1.5; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .x { cursor:pointer; background:none; border:none; color:#9aa0a6; font-size:22px; line-height:1; padding:2px 6px; border-radius:8px; }
  .x:hover { background:#2b2d31; color:#fff; }
  .del { margin-right:auto; color:#e08a8a; background:none; border:1px solid #4a3030; }
  .del:hover { background:#3a2626; color:#fff; border-color:#7a4040; }
  @media (max-width:820px){
    .lhead, .lrow { grid-template-columns:42px minmax(0,1fr) 120px; }
    .lhead .h-proj, .lhead .h-ver, .lhead .h-upd, .lrow .chip, .lrow .ver, .lrow .upd { display:none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1 id="title">Design Tracker</h1>
    <div class="controls">
      <select class="flt" id="proj"><option value="">All projects</option></select>
      <select class="flt" id="fstatus"><option value="">All status</option></select>
      <select class="flt" id="fpri"><option value="">All priority</option><option>P0</option><option>P1</option><option>P2</option><option>P3</option></select>
      <input id="search" type="search" autocomplete="off" spellcheck="false" placeholder="Search…">
      <button class="btn" id="export" title="Download a snapshot (DESIGN-TRACKER.md) to commit/share">Export</button>
      <button class="btn" id="reset" title="Discard local edits, reload the published seed">Reset</button>
    </div>
  </div>
  <div class="sub" id="sub">Your working list · edits save in this browser · <strong>Hosted</strong> = shipped to the <a href="registry.html">registry</a>.</div>

  <div class="quickadd">
    <input id="qa" type="text" placeholder="+ Dump a task… (title, press Enter — lands in “To build”, P2)">
    <button class="btn btn-primary" id="qa-btn">Add</button>
  </div>

  <div class="lhead">
    <span>Pri</span><span>Task</span><span class="h-proj">Project</span><span>Status</span><span class="h-ver">Ver</span><span class="h-upd">Updated</span>
  </div>
  <div class="list" id="list"></div>
  <div class="nores" id="nores">No matching tasks.</div>
</div>

<!-- editor drawer -->
<div class="ov" id="ov"></div>
<aside class="drawer" id="drawer" role="dialog" aria-label="Task">
  <div class="drawer-head"><strong id="d-head">Task</strong><button class="x" id="d-close">&times;</button></div>
  <div class="drawer-body">
    <div class="fld"><label>Title</label><input id="f-item" type="text" placeholder="Task title"></div>
    <div class="row2">
      <div class="fld"><label>Status</label><select id="f-status"></select></div>
      <div class="fld"><label>Priority</label><select id="f-pri"><option value="">—</option><option>P0</option><option>P1</option><option>P2</option><option>P3</option></select></div>
    </div>
    <div class="row2">
      <div class="fld"><label>Project</label><input id="f-project" list="projlist" placeholder="e.g. Client-freelancer"></div>
      <div class="fld"><label>Version</label><input id="f-version" type="text" placeholder="v0.1"></div>
    </div>
    <div class="fld"><label>Updated</label><input id="f-updated" type="text" placeholder="YYYY-MM-DD"></div>
    <div class="fld"><label>Link (Figma / preview / src)</label><input id="f-link" type="text" placeholder="https://…  or  [label](https://…)"></div>
    <div class="fld"><label>Notes</label><textarea id="f-notes" placeholder="Context, decisions, open questions, version log…"></textarea></div>
    <datalist id="projlist"></datalist>
  </div>
  <div class="drawer-foot">
    <button class="btn del" id="d-del">Delete</button>
    <button class="btn" id="d-cancel">Cancel</button>
    <button class="btn btn-primary" id="d-save">Save</button>
  </div>
</aside>

<script id="md" type="text/plain">
# Design Tracker

Pre-handoff design pipeline (list view). Status ∈ `To build` · `In design` · `In review` · `Ready for handoff` · `Hosted`. Priority ∈ `P0` · `P1` · `P2` · `P3` (blank = none). When a design ships to the [Hosted Pages Registry](registry.html), set Status to **Hosted**.

| Item | Project | Status | Priority | Version | Updated | Link | Notes |
|---|---|---|---|---|---|---|---|
| PLG loop — self-serve activation + paywall | Client-freelancer | To build | P0 | v0 | 2026-06-28 |  | signup → add contractor → pay → upgrade |
| AI support widget ("Ask AI") | Wisemonk UI | To build | P0 | v0 | 2026-06-28 |  | grounded in help/SCREENS, human fallback |
| Funnel analytics events | contractor-legal-ai | In design | P0 | v0.1 | 2026-06-28 |  | Q3 M0 · signup→activate→pay→upgrade event spec |
| ICP-branched onboarding | Client-freelancer | To build | P1 | v0 | 2026-06-28 |  | goal selector → tailored checklist/dashboard |
| Unified Admin Console | Admin-portal | To build | P1 | v0 | 2026-06-28 |  | one shell over Form 16 / Notifications / Rules / Usage |
| Contractor onboarding · Get started | contractor-legal-ai | Ready for handoff | P1 | v1 | 2026-06-28 | [src](https://github.com/AnjuChorotiya/contractor-legal-ai/blob/dev/frontend/src/app/onboarding/get-started/page.tsx) | on dev; merge dev→main to ship to prod |
| Workspace onboarding (5-step) | contractor-legal-ai | Ready for handoff | P1 | v1 | 2026-06-28 | [src](https://github.com/AnjuChorotiya/contractor-legal-ai/blob/dev/frontend/src/app/onboarding/workspace/page.tsx) | on dev; not yet in prod |
| In-workflow testimonials | Client-freelancer | To build | P2 | v0 | 2026-06-28 |  | capture after positive feedback |
| App shell (nav + header) | Wisemonk UI | Hosted |  | v1.3 | 2026-06-12 | [live](https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/app-shell.html) | shipped · exact portal nav+header |
| Dev notes (annotations) | Wisemonk UI | Hosted |  | v1.5 | 2026-06-17 | [live](https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/dev-notes.js) | shipped · drop-in on every project |
| Before/after-setup home + empty tabs | Client-freelancer | Hosted |  | v1 | 2026-06-17 | [live](https://anjuchorotiya.github.io/Client-freelancer/home.html?setup) | shipped · checklist, empty tabs, setup banner |
| EOR org + employee onboarding | wisemonk | Hosted |  | v1 | 2026-06-12 | [live](https://anjuchorotiya.github.io/wisemonk/) | shipped |
| contractor-legal-ai (app) | contractor-legal-ai | Hosted |  | v1 | 2026-06-28 | [live](https://legal.wisemonk.io) | shipped · live in production |
</script>

<script>
  const md = document.getElementById('md').textContent;
  const STORE = 'wm_design_tracker_v1';
  const STATUSES = ['To build','In design','In review','Ready for handoff','Hosted'];
  const STATUS_DOT = { 'To build':'#9aa0a6','In design':'#5aa6ff','In review':'#f0b132','Ready for handoff':'#3ad29f','Hosted':'#37c97a' };
  const PRI_ORDER = { 'P0':0,'P1':1,'P2':2,'P3':3,'':9 };
  const listEl = document.getElementById('list');
  let tasks = [], wired = false;

  function uid(){ return 't' + Math.random().toString(36).slice(2, 9); }
  function today(){ try { return new Date().toISOString().slice(0,10); } catch(e){ return ''; } }
  function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function parseSeed(text){
    const out = [];
    text.split(/\r?\n/).forEach(line => {
      line = line.trim();
      if (line[0] !== '|') return;
      const c = line.split('|').slice(1, -1).map(s => s.trim());
      if (c.length < 4 || /^:?-{2,}:?$/.test(c[0]) || c[0].toLowerCase() === 'item') return;
      out.push({ id: uid(), item: c[0], project: c[1]||'', status: STATUSES.includes(c[2]) ? c[2] : 'To build',
        priority: ['P0','P1','P2','P3'].includes(c[3]) ? c[3] : '', version: c[4]||'', updated: c[5]||'', link: c[6]||'', notes: c[7]||'' });
    });
    return out;
  }
  function load(){
    try { const s = localStorage.getItem(STORE); if (s) return JSON.parse(s).map(t => ({ priority:'', ...t })); } catch(e){}
    return parseSeed(md);
  }
  function persist(){ try { localStorage.setItem(STORE, JSON.stringify(tasks)); } catch(e){} }

  function linkHtml(cell){
    if (!cell) return '';
    let m = cell.match(/\[([^\]]+)\]\(([^)]+)\)/);
    let url = m ? m[2] : (/^https?:\/\//.test(cell) ? cell : '');
    if (!url) return '';
    return `<a class="t-link" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(m ? m[1] : 'open')} →</a>`;
  }

  function render(){ tasks = load(); if (!wired){ wireOnce(); wired = true; } draw(); }

  function draw(){
    const q = (document.getElementById('search').value || '').trim().toLowerCase();
    const pf = document.getElementById('proj').value;
    const sf = document.getElementById('fstatus').value;
    const prf = document.getElementById('fpri').value;

    // filter dropdown options
    const proj = document.getElementById('proj');
    const projects = [...new Set(tasks.map(t => t.project).filter(Boolean))].sort();
    proj.innerHTML = '<option value="">All projects</option>' + projects.map(p => `<option${p===pf?' selected':''}>${esc(p)}</option>`).join('');
    document.getElementById('projlist').innerHTML = projects.map(p => `<option value="${esc(p)}">`).join('');
    const fstatus = document.getElementById('fstatus');
    fstatus.innerHTML = '<option value="">All status</option>' + STATUSES.map(s => `<option${s===sf?' selected':''}>${s}</option>`).join('');

    const rows = tasks
      .filter(t => (!pf || t.project === pf) && (!sf || t.status === sf) && (!prf || t.priority === prf)
        && (!q || (t.item + ' ' + t.project + ' ' + t.notes).toLowerCase().includes(q)))
      .sort((a,b) => (PRI_ORDER[a.priority] - PRI_ORDER[b.priority])
        || (STATUSES.indexOf(a.status) - STATUSES.indexOf(b.status))
        || (b.updated || '').localeCompare(a.updated || ''));

    listEl.innerHTML = rows.map(rowHtml).join('');
    document.getElementById('nores').style.display = rows.length ? 'none' : 'block';
    document.getElementById('sub').innerHTML = `${tasks.length} tasks · edits save in this browser · <strong>Hosted</strong> = shipped to the <a href="registry.html">registry</a>.`;
    listEl.querySelectorAll('.lrow').forEach(r => r.addEventListener('click', () => openEditor(r.dataset.id)));
  }

  function rowHtml(t){
    const pr = t.priority ? `<span class="pri ${t.priority}">${t.priority}</span>` : `<span class="pri none">—</span>`;
    return `<div class="lrow" data-id="${t.id}">
      <span>${pr}</span>
      <span><div class="t-title">${esc(t.item) || '(untitled)'}</div>${t.notes ? `<div class="t-notes">${esc(t.notes)}</div>` : ''}${linkHtml(t.link)}</span>
      <span>${t.project ? `<span class="chip">${esc(t.project)}</span>` : ''}</span>
      <span class="st"><span class="st-dot" style="background:${STATUS_DOT[t.status]||'#9aa0a6'}"></span>${esc(t.status)}</span>
      <span>${t.version ? `<span class="ver">${esc(t.version)}</span>` : ''}</span>
      <span class="upd">${esc(t.updated)}</span>
    </div>`;
  }

  // ---- editor ----
  let editingId = null;
  function openEditor(id){
    const t = tasks.find(x => x.id === id); if (!t) return;
    editingId = id;
    document.getElementById('d-head').textContent = 'Edit task';
    document.getElementById('f-status').innerHTML = STATUSES.map(s => `<option${s===t.status?' selected':''}>${s}</option>`).join('');
    document.getElementById('f-item').value = t.item || '';
    document.getElementById('f-project').value = t.project || '';
    document.getElementById('f-pri').value = t.priority || '';
    document.getElementById('f-version').value = t.version || '';
    document.getElementById('f-updated').value = t.updated || '';
    document.getElementById('f-link').value = t.link || '';
    document.getElementById('f-notes').value = t.notes || '';
    document.getElementById('ov').classList.add('open');
    document.getElementById('drawer').classList.add('open');
    document.getElementById('f-item').focus();
  }
  function closeEditor(){ editingId = null; document.getElementById('ov').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
  function saveEditor(){
    const t = tasks.find(x => x.id === editingId); if (!t) return;
    t.item = document.getElementById('f-item').value.trim();
    t.project = document.getElementById('f-project').value.trim();
    t.status = document.getElementById('f-status').value;
    t.priority = document.getElementById('f-pri').value;
    t.version = document.getElementById('f-version').value.trim();
    t.updated = document.getElementById('f-updated').value.trim() || today();
    t.link = document.getElementById('f-link').value.trim();
    t.notes = document.getElementById('f-notes').value.trim();
    persist(); closeEditor(); draw();
  }
  function deleteEditor(){ if (editingId && confirm('Delete this task?')) { tasks = tasks.filter(x => x.id !== editingId); persist(); closeEditor(); draw(); } }

  function exportMd(){
    let out = '# Design Tracker\n\n| Item | Project | Status | Priority | Version | Updated | Link | Notes |\n|---|---|---|---|---|---|---|---|\n';
    tasks.forEach(t => {
      const cells = [t.item, t.project, t.status, t.priority||'', t.version, t.updated, t.link, (t.notes||'').replace(/\n/g,' ')].map(c => (c||'').replace(/\|/g,'\\|'));
      out += '| ' + cells.join(' | ') + ' |\n';
    });
    const blob = new Blob([out], { type: 'text/markdown' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'DESIGN-TRACKER.md'; a.click(); URL.revokeObjectURL(a.href);
  }
  function quickAdd(){
    const inp = document.getElementById('qa'); const v = inp.value.trim(); if (!v) return;
    tasks.unshift({ id: uid(), item: v, project: '', status: 'To build', priority: 'P2', version: 'v0', updated: today(), link: '', notes: '' });
    inp.value = ''; persist(); draw();
  }
  function wireOnce(){
    ['search'].forEach(id => document.getElementById(id).addEventListener('input', draw));
    ['proj','fstatus','fpri'].forEach(id => document.getElementById(id).addEventListener('change', draw));
    document.getElementById('qa-btn').addEventListener('click', quickAdd);
    document.getElementById('qa').addEventListener('keydown', e => { if (e.key === 'Enter') quickAdd(); });
    document.getElementById('export').addEventListener('click', exportMd);
    document.getElementById('reset').addEventListener('click', () => { if (confirm('Discard local edits and reload the published list?')) { try { localStorage.removeItem(STORE); } catch(e){} tasks = parseSeed(md); persist(); draw(); } });
    document.getElementById('d-close').addEventListener('click', closeEditor);
    document.getElementById('d-cancel').addEventListener('click', closeEditor);
    document.getElementById('ov').addEventListener('click', closeEditor);
    document.getElementById('d-save').addEventListener('click', saveEditor);
    document.getElementById('d-del').addEventListener('click', deleteEditor);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditor(); });
  }

  if (document.getElementById("md")) render();
</script>
</body>
</html>
