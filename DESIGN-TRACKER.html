<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Design Tracker</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#1e1f22; color:#e6e6e6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.5; }
  a { color:#5aa6ff; text-decoration:none; } a:hover { text-decoration:underline; }
  .wrap { max-width:1600px; margin:0 auto; padding:22px 20px 64px; }
  .header { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  h1 { font-size:25px; margin:0; }
  .sub { color:#9aa0a6; font-size:13px; margin:2px 0 16px; }
  .sub a { color:#9aa0a6; text-decoration:underline; }
  .controls { display:flex; gap:8px; flex:0 0 auto; flex-wrap:wrap; align-items:center; }
  input, select, textarea, button { font-family:inherit; }
  #search, #proj { height:36px; padding:0 11px; font-size:14px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; outline:none; }
  #search { width:220px; max-width:100%; }
  #search:focus, #proj:focus { border-color:#5aa6ff; }
  .btn { height:36px; padding:0 13px; font-size:13px; font-weight:600; color:#cdd2d8; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; cursor:pointer; }
  .btn:hover { border-color:#5aa6ff; color:#fff; }
  .btn-primary { background:#2684FF; color:#fff; border-color:#2684FF; }
  .btn-primary:hover { background:#1a6fe0; }
  /* quick add */
  .quickadd { display:flex; gap:8px; margin:0 0 16px; }
  .quickadd input { flex:1; height:40px; padding:0 14px; font-size:14px; color:#e6e6e6; background:#26282c; border:1px solid #34363b; border-radius:10px; outline:none; }
  .quickadd input:focus { border-color:#5aa6ff; }
  /* board */
  .board { display:grid; grid-template-columns:repeat(5, minmax(230px,1fr)); gap:14px; align-items:start; }
  .col { background:#26282c; border:1px solid #34363b; border-radius:14px; padding:10px 10px 16px; min-height:120px; transition:background .12s, border-color .12s; }
  .col.drop { background:#202a36; border-color:#2684FF; }
  .col-head { display:flex; align-items:center; gap:8px; padding:6px 6px 10px; font-size:13.5px; font-weight:700; }
  .col-dot { width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
  .col-count { font-size:12px; font-weight:700; color:#9aa0a6; background:#1e1f22; border-radius:100px; padding:1px 9px; }
  .col-add { margin-left:auto; width:24px; height:24px; line-height:1; font-size:17px; color:#9aa0a6; background:none; border:none; border-radius:7px; cursor:pointer; }
  .col-add:hover { background:#1e1f22; color:#fff; }
  .card { background:#1f2024; border:1px solid #34363b; border-radius:11px; padding:11px 12px; margin:8px 0; cursor:pointer; }
  .card:hover { border-color:#4a4d55; }
  .card.dragging { opacity:.4; }
  .card-top { display:flex; align-items:flex-start; gap:8px; }
  .card-title { font-size:14px; font-weight:700; color:#f0f1f3; flex:1; }
  .ver { flex:0 0 auto; font-size:11px; font-weight:700; color:#cdd2d8; background:#2b2d31; border:1px solid #3a3c42; border-radius:6px; padding:1px 7px; }
  .meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .chip { font-size:11px; font-weight:600; color:#cdd2d8; background:#2b2d31; border-radius:100px; padding:2px 9px; }
  .upd { font-size:11px; color:#7f868f; }
  .notes-prev { font-size:12px; color:#9aa0a6; margin-top:8px; line-height:1.45; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .has-note { font-size:11px; color:#7f868f; margin-top:6px; }
  .empty { color:#5a616a; font-size:12px; text-align:center; padding:10px 6px; }
  /* editor drawer */
  .ov { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:none; }
  .ov.open { display:block; }
  .drawer { position:fixed; top:0; right:0; bottom:0; width:min(440px,94vw); background:#1b1c1f; border-left:1px solid #34363b;
    z-index:51; transform:translateX(100%); transition:transform .24s ease; display:flex; flex-direction:column; box-shadow:-2px 0 26px rgba(0,0,0,.45); }
  .drawer.open { transform:translateX(0); }
  .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid #34363b; }
  .drawer-head strong { font-size:15px; }
  .drawer-body { overflow:auto; padding:16px 18px; flex:1; }
  .drawer-foot { display:flex; gap:10px; padding:14px 18px; border-top:1px solid #34363b; }
  .fld { margin-bottom:14px; }
  .fld label { display:block; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#8a9098; margin-bottom:6px; }
  .fld input, .fld select, .fld textarea { width:100%; padding:9px 11px; font-size:14px; color:#e6e6e6; background:#2b2d31; border:1px solid #3a3c42; border-radius:9px; outline:none; }
  .fld input:focus, .fld select:focus, .fld textarea:focus { border-color:#5aa6ff; }
  .fld textarea { min-height:150px; resize:vertical; line-height:1.5; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .x { cursor:pointer; background:none; border:none; color:#9aa0a6; font-size:22px; line-height:1; padding:2px 6px; border-radius:8px; }
  .x:hover { background:#2b2d31; color:#fff; }
  .del { margin-right:auto; color:#e08a8a; background:none; border:1px solid #4a3030; }
  .del:hover { background:#3a2626; color:#fff; border-color:#7a4040; }
  .nores { display:none; color:#c98a8a; padding:18px 4px; }
  @media (max-width:1200px){ .board{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:640px){ .board{ grid-template-columns:1fr; } #search{width:100%;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1 id="title">Design Tracker</h1>
    <div class="controls">
      <select id="proj"><option value="">All projects</option></select>
      <input id="search" type="search" autocomplete="off" spellcheck="false" placeholder="Search…">
      <button class="btn" id="export" title="Download a snapshot (DESIGN-TRACKER.md) to commit/share">Export</button>
      <button class="btn" id="reset" title="Discard local edits, reload the published seed">Reset</button>
    </div>
  </div>
  <div class="sub" id="sub">Your working board · edits save in this browser · <strong>Hosted</strong> = shipped to the <a href="registry.html">registry</a>.</div>

  <div class="quickadd">
    <input id="qa" type="text" placeholder="+ Dump a task… (type a title, press Enter — lands in “To build”)">
    <button class="btn btn-primary" id="qa-btn">Add</button>
  </div>

  <div class="board" id="board"></div>
  <div class="nores" id="nores">No matching cards.</div>
</div>

<!-- editor drawer -->
<div class="ov" id="ov"></div>
<aside class="drawer" id="drawer" role="dialog" aria-label="Task">
  <div class="drawer-head"><strong id="d-head">Task</strong><button class="x" id="d-close">&times;</button></div>
  <div class="drawer-body">
    <div class="fld"><label>Title</label><input id="f-item" type="text" placeholder="Task title"></div>
    <div class="row2">
      <div class="fld"><label>Project</label><input id="f-project" list="projlist" placeholder="e.g. Client-freelancer"></div>
      <div class="fld"><label>Status</label><select id="f-status"></select></div>
    </div>
    <div class="row2">
      <div class="fld"><label>Version</label><input id="f-version" type="text" placeholder="v0.1"></div>
      <div class="fld"><label>Updated</label><input id="f-updated" type="text" placeholder="YYYY-MM-DD"></div>
    </div>
    <div class="fld"><label>Link (Figma / preview / src)</label><input id="f-link" type="text" placeholder="https://…  or  [label](https://…)"></div>
    <div class="fld"><label>Notes</label><textarea id="f-notes" placeholder="Everything about this task — context, decisions, open questions, version log…"></textarea></div>
    <datalist id="projlist"></datalist>
  </div>
  <div class="drawer-foot">
    <button class="btn del" id="d-del">Delete</button>
    <button class="btn" id="d-cancel">Cancel</button>
    <button class="btn btn-primary" id="d-save">Save</button>
  </div>
</aside>

<script id="md" type="text/plain">
# Design Tracker

Pre-handoff design pipeline. Cards flow left → right: **To build → In design → In review → Ready for handoff → Hosted**. When a design ships to the [Hosted Pages Registry](registry.html), move it to **Hosted**. Edit the table below and rebuild.

Status must be one of: `To build` · `In design` · `In review` · `Ready for handoff` · `Hosted`.

| Item | Project | Status | Version | Updated | Link | Notes |
|---|---|---|---|---|---|---|
| PLG loop — self-serve activation + paywall | Client-freelancer | To build | v0 | 2026-06-28 |  | SCOPE P0 · signup → add contractor → pay → upgrade |
| AI support widget ("Ask AI") | Wisemonk UI | To build | v0 | 2026-06-28 |  | SCOPE P0 · grounded in help/SCREENS, human fallback |
| ICP-branched onboarding | Client-freelancer | To build | v0 | 2026-06-28 |  | SCOPE P1 · goal selector → tailored checklist/dashboard |
| Unified Admin Console | Admin-portal | To build | v0 | 2026-06-28 |  | SCOPE P1 · one shell over Form 16 / Notifications / Rules / Usage |
| In-workflow testimonials | Client-freelancer | To build | v0 | 2026-06-28 |  | SCOPE P2 · capture after positive feedback |
| Funnel analytics events | contractor-legal-ai | In design | v0.1 | 2026-06-28 |  | Q3 M0 · signup→activate→pay→upgrade event spec |
| Contractor onboarding · Get started | contractor-legal-ai | Ready for handoff | v1 | 2026-06-28 | [src](https://github.com/AnjuChorotiya/contractor-legal-ai/blob/dev/frontend/src/app/onboarding/get-started/page.tsx) | on `dev`; merge dev→main to ship to prod |
| Workspace onboarding (5-step) | contractor-legal-ai | Ready for handoff | v1 | 2026-06-28 | [src](https://github.com/AnjuChorotiya/contractor-legal-ai/blob/dev/frontend/src/app/onboarding/workspace/page.tsx) | on `dev`; not yet in prod |
| App shell (nav + header) | Wisemonk UI | Hosted | v1.3 | 2026-06-12 | [live](https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/app-shell.html) | shipped · exact portal nav+header |
| Dev notes (annotations) | Wisemonk UI | Hosted | v1.5 | 2026-06-17 | [live](https://anjuchorotiya.github.io/Client-freelancer/wisemonk-ui/dev-notes.js) | shipped · drop-in on every project |
| Before/after-setup home + empty tabs | Client-freelancer | Hosted | v1 | 2026-06-17 | [live](https://anjuchorotiya.github.io/Client-freelancer/home.html?setup) | shipped · checklist, empty tabs, setup banner |
| EOR org + employee onboarding | wisemonk | Hosted | v1 | 2026-06-12 | [live](https://anjuchorotiya.github.io/wisemonk/) | shipped |
| contractor-legal-ai (app) | contractor-legal-ai | Hosted | v1 | 2026-06-28 | [live](https://legal.wisemonk.io) | shipped · live in production |

<!-- How to add: copy a row, set Status to one of the five values, bump Version on each iteration, update the date.
     Hosted = it's in the registry (registry.html). Rebuild with: node build-registry.js "1234" "EOR/docs/design-tracker.html" "DESIGN-TRACKER.md" "DESIGN-TRACKER.html" "Design tracker" "Enter the password to view the design tracker." 'if (document.getElementById("md")) render();' -->
</script>

<script>
  const md = document.getElementById('md').textContent;
  const STORE = 'wm_design_tracker_v1';
  const COLUMNS = [
    { key:'To build',          dot:'#9aa0a6' },
    { key:'In design',         dot:'#5aa6ff' },
    { key:'In review',         dot:'#f0b132' },
    { key:'Ready for handoff', dot:'#3ad29f' },
    { key:'Hosted',            dot:'#37c97a' }
  ];
  const STATUSES = COLUMNS.map(c => c.key);
  const board = document.getElementById('board');
  let tasks = [];
  let wired = false;

  function uid(){ return 't' + Math.random().toString(36).slice(2, 9); }
  function today(){ try { return new Date().toISOString().slice(0,10); } catch(e){ return ''; } }
  function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function parseSeed(text){
    const out = [];
    text.split(/\r?\n/).forEach(line => {
      line = line.trim();
      if (line[0] !== '|') return;
      const c = line.split('|').slice(1, -1).map(s => s.trim());
      if (c.length < 3 || /^:?-{2,}:?$/.test(c[0]) || c[0].toLowerCase() === 'item') return;
      out.push({ id: uid(), item: c[0], project: c[1]||'', status: STATUSES.includes(c[2]) ? c[2] : 'To build',
        version: c[3]||'', updated: c[4]||'', link: c[5]||'', notes: c[6]||'' });
    });
    return out;
  }
  function load(){
    try { const s = localStorage.getItem(STORE); if (s) return JSON.parse(s); } catch(e){}
    return parseSeed(md);
  }
  function persist(){ try { localStorage.setItem(STORE, JSON.stringify(tasks)); } catch(e){} }

  function linkHtml(cell){
    if (!cell) return '';
    let m = cell.match(/\[([^\]]+)\]\(([^)]+)\)/);
    let url = m ? m[2] : (/^https?:\/\//.test(cell) ? cell : '');
    let label = m ? m[1] : 'open';
    if (!url) return '';
    return `<a href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(label)} →</a>`;
  }

  function render(){               // called once (or after gate-decrypt)
    tasks = load();
    if (!wired) { wireOnce(); wired = true; }
    draw();
  }

  function draw(){
    const q = (document.getElementById('search').value || '').trim().toLowerCase();
    const pf = document.getElementById('proj').value;
    // project filter options
    const proj = document.getElementById('proj');
    const projects = [...new Set(tasks.map(t => t.project).filter(Boolean))].sort();
    const cur = proj.value;
    proj.innerHTML = '<option value="">All projects</option>' + projects.map(p => `<option${p===cur?' selected':''}>${esc(p)}</option>`).join('');
    document.getElementById('projlist').innerHTML = projects.map(p => `<option value="${esc(p)}">`).join('');

    board.innerHTML = '';
    let shown = 0;
    COLUMNS.forEach(col => {
      const cards = tasks.filter(t => t.status === col.key
        && (!pf || t.project === pf)
        && (!q || (t.item + ' ' + t.project + ' ' + t.notes).toLowerCase().includes(q)));
      shown += cards.length;
      const el = document.createElement('div');
      el.className = 'col'; el.dataset.status = col.key;
      el.innerHTML = `<div class="col-head"><span class="col-dot" style="background:${col.dot}"></span>${col.key}`
        + `<span class="col-count">${cards.length}</span>`
        + `<button class="col-add" title="Add to ${col.key}" data-add="${col.key}">+</button></div>`
        + (cards.length ? cards.map(cardHtml).join('') : '<div class="empty">drop here</div>');
      // drop target
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drop'); });
      el.addEventListener('dragleave', () => el.classList.remove('drop'));
      el.addEventListener('drop', e => {
        e.preventDefault(); el.classList.remove('drop');
        const id = e.dataTransfer.getData('text/id');
        const t = tasks.find(x => x.id === id);
        if (t && t.status !== col.key) { t.status = col.key; t.updated = today(); persist(); draw(); }
      });
      board.appendChild(el);
    });
    document.getElementById('nores').style.display = shown ? 'none' : 'block';
    document.getElementById('sub').innerHTML = `${tasks.length} tasks · edits save in this browser · <strong>Hosted</strong> = shipped to the <a href="registry.html">registry</a>.`;

    // wire cards
    board.querySelectorAll('.card').forEach(c => {
      c.addEventListener('click', () => openEditor(c.dataset.id));
      c.addEventListener('dragstart', e => { e.dataTransfer.setData('text/id', c.dataset.id); c.classList.add('dragging'); });
      c.addEventListener('dragend', () => c.classList.remove('dragging'));
    });
    board.querySelectorAll('[data-add]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); addTask(b.dataset.add); }));
  }

  function cardHtml(t){
    return `<div class="card" draggable="true" data-id="${t.id}">
      <div class="card-top"><span class="card-title">${esc(t.item) || '(untitled)'}</span>${t.version ? `<span class="ver">${esc(t.version)}</span>` : ''}</div>
      <div class="meta">${t.project ? `<span class="chip">${esc(t.project)}</span>` : ''}${t.updated ? `<span class="upd">${esc(t.updated)}</span>` : ''}</div>
      ${t.notes ? `<div class="notes-prev">${esc(t.notes)}</div>` : ''}
      ${linkHtml(t.link) ? `<div class="has-note">${linkHtml(t.link)}</div>` : ''}
    </div>`;
  }

  // ---- editor ----
  let editingId = null;
  function openEditor(id){
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('d-head').textContent = 'Edit task';
    const sel = document.getElementById('f-status');
    sel.innerHTML = STATUSES.map(s => `<option${s===t.status?' selected':''}>${s}</option>`).join('');
    document.getElementById('f-item').value = t.item || '';
    document.getElementById('f-project').value = t.project || '';
    document.getElementById('f-version').value = t.version || '';
    document.getElementById('f-updated').value = t.updated || '';
    document.getElementById('f-link').value = t.link || '';
    document.getElementById('f-notes').value = t.notes || '';
    document.getElementById('ov').classList.add('open');
    document.getElementById('drawer').classList.add('open');
    document.getElementById('f-item').focus();
  }
  function closeEditor(){ editingId = null; document.getElementById('ov').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
  function saveEditor(){
    const t = tasks.find(x => x.id === editingId);
    if (!t) return;
    t.item = document.getElementById('f-item').value.trim();
    t.project = document.getElementById('f-project').value.trim();
    t.status = document.getElementById('f-status').value;
    t.version = document.getElementById('f-version').value.trim();
    t.updated = document.getElementById('f-updated').value.trim() || today();
    t.link = document.getElementById('f-link').value.trim();
    t.notes = document.getElementById('f-notes').value.trim();
    persist(); closeEditor(); draw();
  }
  function deleteEditor(){
    if (editingId && confirm('Delete this task?')) { tasks = tasks.filter(x => x.id !== editingId); persist(); closeEditor(); draw(); }
  }
  function addTask(status){
    const t = { id: uid(), item: '', project: '', status: status || 'To build', version: 'v0', updated: today(), link: '', notes: '' };
    tasks.unshift(t); persist(); draw(); openEditor(t.id);
  }

  // ---- export to markdown (snapshot to commit/share) ----
  function exportMd(){
    let out = '# Design Tracker\n\n| Item | Project | Status | Version | Updated | Link | Notes |\n|---|---|---|---|---|---|---|\n';
    tasks.forEach(t => {
      const cells = [t.item, t.project, t.status, t.version, t.updated, t.link, (t.notes||'').replace(/\n/g, ' ')].map(c => (c||'').replace(/\|/g, '\\|'));
      out += '| ' + cells.join(' | ') + ' |\n';
    });
    const blob = new Blob([out], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'DESIGN-TRACKER.md'; a.click();
    URL.revokeObjectURL(a.href);
  }

  function wireOnce(){
    document.getElementById('search').addEventListener('input', draw);
    document.getElementById('proj').addEventListener('change', draw);
    document.getElementById('qa-btn').addEventListener('click', quickAdd);
    document.getElementById('qa').addEventListener('keydown', e => { if (e.key === 'Enter') quickAdd(); });
    document.getElementById('export').addEventListener('click', exportMd);
    document.getElementById('reset').addEventListener('click', () => {
      if (confirm('Discard local edits and reload the published board?')) { try { localStorage.removeItem(STORE); } catch(e){} tasks = parseSeed(md); persist(); draw(); }
    });
    document.getElementById('d-close').addEventListener('click', closeEditor);
    document.getElementById('d-cancel').addEventListener('click', closeEditor);
    document.getElementById('ov').addEventListener('click', closeEditor);
    document.getElementById('d-save').addEventListener('click', saveEditor);
    document.getElementById('d-del').addEventListener('click', deleteEditor);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditor(); });
  }
  function quickAdd(){
    const inp = document.getElementById('qa');
    const v = inp.value.trim();
    if (!v) return;
    tasks.unshift({ id: uid(), item: v, project: '', status: 'To build', version: 'v0', updated: today(), link: '', notes: '' });
    inp.value = ''; persist(); draw();
  }

  if (document.getElementById("md")) render();
</script>
</body>
</html>
